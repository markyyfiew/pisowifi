<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piso WiFi Client</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    flex-direction:column;
}

/* TITLE (Client Time) */
h1{
    margin-bottom:20px;
    color:#60a5fa;
    text-align:center;
}

/* CARD */
.box{
    width:90%;
    max-width:400px;
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,.3);
    transition:.3s;
}

.box:hover{
    transform:translateY(-3px);
}

/* TIMER */
.timer{
    font-size:50px;
    font-weight:bold;
    color:#60a5fa;
    margin:15px 0;
    text-align:center;
}

/* STATUS */
.status{
    font-size:18px;
    margin-bottom:10px;
    text-align:center;
}

/* NOTE */
.note{
    color:#94a3b8;
    font-size:14px;
    text-align:center;
}

h2{
    margin-bottom:10px;
    text-align:center;
}
</style>
</head>

<body>

<h1>📶 Client Time</h1>

<div class="box">

    <h2>Time Remaining</h2>

    <div id="timer" class="timer">00:00:00</div>

    <div id="status" class="status">
        Loading...
    </div>

    <div class="note">
        Timer is managed by the administrator.
    </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>

const sessionsRef = db.ref("sessions");

/* GET SESSION ID */
const params = new URLSearchParams(window.location.search);
const sessionId = params.get("id");

if(!sessionId){
    document.body.innerHTML = "<h2 style='color:red'>No Session ID Found</h2>";
}

/* SESSION DATA */
let session = null;

sessionsRef.child(sessionId).on("value", snap => {
    session = snap.val();
});

/* FORMAT TIME */
function format(ms){
    if(ms < 0) ms = 0;

    let h = Math.floor(ms / 3600000);
    let m = Math.floor((ms % 3600000) / 60000);
    let s = Math.floor((ms % 60000) / 1000);

    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

/* TIMER LOOP */
setInterval(() => {

    const timerEl = document.getElementById("timer");
    const statusEl = document.getElementById("status");

    if(!session){
        timerEl.innerText = "00:00:00";
        statusEl.innerText = "Loading...";
        return;
    }

    let remaining = session.paused
        ? session.remaining
        : (session.end - Date.now());

    timerEl.innerText = format(remaining);

    if(remaining <= 0){
        statusEl.innerText = "Expired";
    } else {
        statusEl.innerText = session.paused ? "Paused" : "Active";
    }

}, 1000);

</script>

</body>
</html>
